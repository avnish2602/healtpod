name: Deploy Vite Frontend App to VPS

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: |
          npm install --legacy-peer-deps

      - name: Run Linting
        run: |
          npm run lint

      - name: Build Application
        run: |
          npm run build

      # ----------------------------
      #   🔥 Upload built files to VPS directory
      # ----------------------------
      - name: Copy build files to VPS
        uses: appleboy/scp-action@v0.1.4
        with:
          host: ${{ secrets.REMOTE_HOST }}
          username: ${{ secrets.REMOTE_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: "dist/*"
          target: ${{ secrets.FRONTEND_PROD_PATH }}
          strip_components: 1
          overwrite: true
